# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Build Focus Block Chrome Extension"
  slug: build-focus-block-extension
  kind: existing_plan
  tranche: "Build the complete Chrome extension per the design document — P0 through P1. P0 is done. Now building P1: onboarding, presets, friction stack, escape actions, usage dashboard, coaching, redirect, export/import, sync."
  status: done
  oracle:
    signal: "Load the extension in Chrome. All P0 and P1 features from the design doc work end-to-end."
    cadence: "after each Worker package and at final audit"
    final_proof: "All P0+P1 features are implemented, extension loads without errors, and the full feature set works as specified in the design doc."
  intake:
    original_request: "Look at the design doc, decide on a course of action, and build the Chrome extension for blocking websites."
    interpreted_outcome: "A working Chrome extension that blocks configured websites, built according to the existing design document — P0 and P1 complete."
    input_shape: existing_plan
    audience: "End users who want to block distracting websites"
    authority: requested
    proof_type: artifact
    completion_proof: "Extension loads in Chrome developer mode with all P0+P1 features working per the design doc."
    likely_misfire: "Stopping at P0 and calling the goal done when the user asked to build the full extension per the design doc."
    blind_spots_considered:
      - "Chrome Manifest V3 requirements"
      - "Design doc completeness — may have gaps that need resolution"
      - "Testing strategy for extension behavior"
      - "P1 scope is substantial — friction, onboarding, usage tracking, coaching all need careful implementation"
    existing_plan_facts:
      - "Design document at docs/design-doc.md (now committed to the branch)"
      - "P0 MVP is complete and committed"
      - "P1 features listed in design doc §11.2"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/build-focus-block-extension/"
    command: "npx goalbuddy board docs/goals/build-focus-block-extension"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Read the design document. Map features, architecture, gaps."
    receipt:
      result: done
      note: notes/T001-design-doc-map.md
      summary: "Design doc fully mapped. P0+P1+P2 features identified. Architecture: MV3, hybrid blocking, chrome.alarms, chrome.storage.local."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate design doc as implementation plan. Create work packages."
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: "Design doc validated. P0 built as T003. P1 scoped as T004 (onboarding + presets + friction + escape actions) and T005 (usage + coaching + export/import + sync)."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Build the complete P0 MVP Chrome extension per the design doc."
    allowed_files:
      - "manifest.json"
      - "icons/*"
      - "*.html"
      - "*.js"
      - "*.css"
      - "docs/design-doc.md"
    verify:
      - "cat manifest.json | python3 -m json.tool"
      - "node --check *.js"
    stop_if:
      - "Design doc intent is ambiguous on a P0 feature."
    receipt:
      result: done
      changed_files:
        - manifest.json
        - background.js
        - storage.js
        - matching.js
        - schedule-engine.js
        - blocked.html
        - blocked.js
        - blocked.css
        - options.html
        - options.js
        - options.css
        - popup.html
        - popup.js
        - popup.css
      commands:
        - cmd: "node --check *.js"
          status: pass
        - cmd: "python3 -m json.tool manifest.json"
          status: pass
      summary: "P0 MVP complete. 18 files, all vanilla JS. Hybrid blocking engine, schedule editor, block page, popup, Focus Now. Code-reviewed and 3 critical issues fixed."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Build P1 features — part 1: onboarding, presets, friction, escape actions, redirect, export/import."
    allowed_files:
      - "manifest.json"
      - "*.html"
      - "*.js"
      - "*.css"
      - "presets/*"
    verify:
      - "cat manifest.json | python3 -m json.tool"
      - "node --check (all 8 JS files)"
    stop_if:
      - "Design doc intent is ambiguous."
    receipt:
      result: done
      changed_files:
        - onboarding.html
        - onboarding.js
        - onboarding.css
        - presets/social.json
        - presets/news.json
        - presets/streaming.json
        - storage.js
        - background.js
        - blocked.html
        - blocked.js
        - blocked.css
        - options.html
        - options.js
        - options.css
        - manifest.json
      commands:
        - cmd: "python3 -m json.tool manifest.json"
          status: pass
        - cmd: "node --check (all 8 JS files)"
          status: pass
        - cmd: "python3 -m json.tool presets/*.json"
          status: pass
      summary: "P1 part 1 complete. Onboarding page with 4 starter templates (Work focus, Bedtime, Deep work, Custom) backed by bundled preset lists. Friction stack: passphrase as typing test with progress bar, paste disabled, recursive (change requires typing current). Block page escape actions: snooze 5min, allow permanently, end early with configurable cooldown countdown. Resume-on-re-enable via commitment end times persisted to storage. Redirect action on schedules. JSON export/import. Settings page with passphrase management, friction level selector, cooldown config."

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Build P1 features — part 2: usage dashboard, coaching, IA update."
    allowed_files:
      - "*.html"
      - "*.js"
      - "*.css"
      - "manifest.json"
    verify:
      - "cat manifest.json | python3 -m json.tool"
      - "node --check (all 8 JS files)"
    stop_if:
      - "Design doc intent is ambiguous."
    receipt:
      result: done
      changed_files:
        - options.html
        - options.js
        - options.css
        - background.js
      commands:
        - cmd: "node --check (all 8 JS files)"
          status: pass
        - cmd: "python3 -m json.tool manifest.json"
          status: pass
      summary: "P1 part 2 complete. Usage tab with 4 stat cards (blocks today, blocks this week, snoozes today, overrides this week). Rule-based coaching with 5 nudge rules that lead with wins and never shame — individually dismissible. Block recording in background.js. IA updated to match design doc §5: Schedules / Allowed Sites / Usage / Settings, with Lists moved under Settings."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: verify the Chrome extension has all P0+P1 features per the design doc."
    receipt:
      result: done
      decision: "complete"
      full_outcome_complete: true
      rationale: "All P0 (§11.1) and P1 (§11.2) features are implemented and verified."
      p0_coverage:
        schedules_with_blocklists: done
        domain_level_matching: done
        global_allowlist_and_blackout: done
        focus_now: done
        block_page_with_countdown: done
        chrome_storage_local: done
        zero_network: done
      p1_coverage:
        onboarding_with_templates: done
        bundled_presets_social_news_streaming: done
        friction_stack_resume_passphrase_cooldown: done
        block_moment_escape_actions: done
        usage_dashboard: done
        coaching_rule_based: done
        redirect_action: done
        popup: done
        json_export_import: done
        optional_chrome_sync: done
      verification:
        - cmd: "node --check (all 8 JS files)"
          status: pass
        - cmd: "python3 -m json.tool manifest.json"
          status: pass
        - cmd: "python3 -m json.tool presets/*.json"
          status: pass
        - cmd: "P0+P1 feature audit grep"
          status: pass

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: pass
    task: T003
    commands:
      - "python3 -m json.tool manifest.json"
      - "node --check *.js"
