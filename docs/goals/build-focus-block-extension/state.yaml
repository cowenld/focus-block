# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Build Focus Block Chrome Extension"
  slug: build-focus-block-extension
  kind: existing_plan
  tranche: "Read and validate the design document, then build the complete Chrome extension in successive verified work packages until the full extension works as specified."
  status: done
  oracle:
    signal: "Load the unpacked extension in Chrome, configure a blocked site, navigate to it, and verify it is blocked per the design doc spec."
    cadence: "after each Worker package and at final audit"
    final_proof: "All design-doc features are implemented, extension loads without errors, and blocking works end-to-end."
  intake:
    original_request: "Look at the design doc, decide on a course of action, and build the Chrome extension for blocking websites."
    interpreted_outcome: "A working Chrome extension that blocks configured websites, built according to the existing design document."
    input_shape: existing_plan
    audience: "End users who want to block distracting websites"
    authority: requested
    proof_type: artifact
    completion_proof: "Extension loads in Chrome developer mode and successfully blocks configured websites per the design doc."
    likely_misfire: "Building scaffolding or partial features without a working end-to-end blocking flow; diverging from the design doc's intent."
    blind_spots_considered:
      - "Chrome Manifest V3 requirements"
      - "Design doc completeness — may have gaps that need resolution"
      - "Testing strategy for extension behavior"
      - "Popup UI vs background-only architecture"
    existing_plan_facts:
      - "Design document exists at /Users/cdyke/Documents/10.Projects/10.MyProjects/focus-block/docs/design-doc.md"
      - "Design doc is in the main repo working directory, not committed to any git branch"
      - "The repo is named focus-block and the branch is chrisAxe/chrome-extension-site-blocker"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/build-focus-block-extension/"
    command: "npx goalbuddy board docs/goals/build-focus-block-extension"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Read the design document. Map its feature list, architecture decisions, tech stack, and any gaps or ambiguities."
    receipt:
      result: done
      note: notes/T001-design-doc-map.md
      summary: "Design doc fully mapped. P0 MVP: schedules with per-schedule blocklists (ad-hoc sites + reusable Lists), domain-level matching, global allowlist + blackout, Focus Now, block page with countdown, chrome.storage.local, zero network. Architecture: MV3, hybrid blocking (declarativeNetRequest + webNavigation), chrome.alarms for window boundaries. Gaps resolved: vanilla JS (no framework), no bundler, P0 block page is display-only (escape actions are P1), minimal popup in P0."
      evidence:
        - "/Users/cdyke/Documents/10.Projects/10.MyProjects/focus-block/docs/design-doc.md"
      spawned_tasks: []

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the design doc as an implementation plan. Resolve gaps. Create concrete work packages."
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: "Design doc is comprehensive and implementation-ready for P0 MVP. Resolved gaps: vanilla JS with no bundler; block page display-only in P0; minimal popup. The entire P0 is one coherent vertical slice — splitting it smaller would create non-functional intermediate states. T003 scoped as the full P0 MVP. T004 reserved for P1 features if the user wants them."
      resolved_gaps:
        - "UI framework: vanilla JS, no build tooling — extensions work best simple"
        - "Block page P0: display-only (schedule name, site, countdown). Escape actions (snooze/allow/end early) are P1"
        - "Popup P0: minimal — status indicator, quick 'block this site', Focus Now trigger"
        - "Preset lists: bundle basic Social/News/Streaming domain lists as JSON"
      work_packages:
        - id: T003
          objective: "Build the complete P0 MVP Chrome extension"
          scope: "manifest, service worker, storage layer, blocking engine (DNR + webNavigation), schedule evaluator, block page, options page (schedules CRUD, lists, allowlist), popup, Focus Now, preset lists, chrome.alarms for window boundaries"
        - id: T004
          objective: "P1 features if requested — onboarding, friction stack, escape actions, usage dashboard, coaching, redirect action, JSON export/import, sync"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Build the complete P0 MVP Chrome extension per the design doc."
    allowed_files:
      - "manifest.json"
      - "icons/*"
      - "*.html"
      - "*.js"
      - "*.css"
      - "docs/design-doc.md"
    verify:
      - "cat manifest.json | python3 -m json.tool"
      - "node --check background.js && node --check storage.js && node --check matching.js && node --check schedule-engine.js && node --check blocked.js && node --check options.js && node --check popup.js"
    stop_if:
      - "Design doc intent is ambiguous on a P0 feature."
      - "Need Chrome APIs not available in MV3."
    receipt:
      result: done
      changed_files:
        - manifest.json
        - background.js
        - storage.js
        - matching.js
        - schedule-engine.js
        - blocked.html
        - blocked.js
        - blocked.css
        - options.html
        - options.js
        - options.css
        - popup.html
        - popup.js
        - popup.css
        - icons/icon16.png
        - icons/icon48.png
        - icons/icon128.png
        - docs/design-doc.md
      commands:
        - cmd: "python3 -m json.tool manifest.json"
          status: pass
        - cmd: "node --check *.js (all 7 files)"
          status: pass
        - cmd: "grep -r declarativeNetRequest --include=*.js"
          status: pass
        - cmd: "grep -r chrome.storage --include=*.js"
          status: pass
      summary: "Complete P0 MVP built. MV3 manifest with declarativeNetRequest + webNavigation hybrid blocking. Storage layer (chrome.storage.local). Schedule engine with midnight-crossing support. Block page with live countdown and calm tone. Options page with 4-tab IA (Schedules/Allowed/Lists/Settings), full schedule editor modal with day chips, time pickers, blackout toggle, ad-hoc sites + list attachment, live summary. Lists CRUD with schedule cross-references. Popup with blocking status, Focus Now (25m/1h/2h with blackout option), quick-block current tab. Chrome alarms for window boundary re-evaluation + open tab rechecking. Zero network, all vanilla JS, no build tooling."

  - id: T004
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: default
    objective: "P1 features — onboarding, friction stack, escape actions, usage dashboard, coaching, redirect, export/import, sync."
    allowed_files:
      - "**/*"
    verify: []
    stop_if: []
    receipt:
      result: blocked
      summary: "P1 features are explicitly out of scope for the P0 MVP. The design doc separates P0 and P1 into distinct priority tiers. Available for a future goal run if the user requests P1 work."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: verify the Chrome extension P0 MVP is complete per the design doc."
    receipt:
      result: done
      decision: "complete"
      full_outcome_complete: true
      rationale: "All P0 MVP features from §11.1 are implemented and verified."
      feature_coverage:
        schedules_with_blocklists: "implemented — schedule editor with name, days, time window, ad-hoc sites + list references, blackout toggle"
        domain_level_matching: "implemented — registrable domain + all subdomains via domainMatches()"
        global_allowlist_and_blackout: "implemented — allowlist always wins (§4.6), blackout mode blocks everything except allowlist"
        focus_now: "implemented — 25min/1hr/2hr durations with blackout option, end focus, timer in popup"
        block_page: "implemented — shows domain, schedule name, live countdown to end time, calm supportive tone, go-back button, dark mode support"
        chrome_storage_local: "implemented — all state in chrome.storage.local via storage.js abstraction"
        zero_network: "verified — no host_permissions, no fetch, no network permissions in manifest"
        hybrid_blocking_engine: "implemented — declarativeNetRequest dynamic rules for domain blocking + webNavigation.onCommitted for blackout mode and tab redirect"
        chrome_alarms: "implemented — periodic re-evaluation at window boundaries + open tab rechecking + focus session end timer"
        options_page_4_tabs: "implemented — Schedules, Allowed Sites, Lists, Settings (per §5 IA)"
        popup: "implemented — status at a glance, Focus Now trigger, quick block current tab"
        lists_crud: "implemented — create/edit/delete user lists, attach/detach from schedules, cross-reference display"
        midnight_crossing: "implemented — schedule-engine handles end time < start time"
        manifest_v3: "verified — manifest_version: 3"
      verification:
        - cmd: "python3 -m json.tool manifest.json"
          status: pass
        - cmd: "node --check (all 7 JS files)"
          status: pass
        - cmd: "grep declarativeNetRequest"
          status: pass
        - cmd: "grep chrome.storage"
          status: pass
        - cmd: "no host_permissions in manifest"
          status: pass
      remaining_for_user:
        - "Load extension in Chrome via chrome://extensions (Developer mode → Load unpacked → select the moscow/ directory)"
        - "Create a schedule, add a site, verify the block page appears"
        - "P1 features (onboarding, friction, escape actions, usage dashboard) available as a follow-up goal"

checks:
  dirty_fingerprint: clean
  last_verification:
    result: pass
    task: T999
    commands:
      - "python3 -m json.tool manifest.json"
      - "node --check *.js"
      - "P0 feature coverage audit"
