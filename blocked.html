<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked — Focus Block</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg></div>
    <h1>You've got this</h1>
    <p class="subtitle">
      <strong id="domain"></strong> is blocked by
      <span id="schedule-name">your schedule</span>
    </p>
    <div class="countdown-section">
      <p class="countdown-label">Access resumes</p>
      <p class="countdown" id="countdown"></p>
    </div>
    <p class="reminder">
      You set this block to help you focus.<br>
      It's working.
    </p>

    <!-- Escape actions -->
    <div id="escape-actions" class="escape-actions" style="display:none">
      <button class="escape-btn" id="btn-snooze"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="4" width="4" height="16" rx="1"/><rect x="6" y="4" width="4" height="16" rx="1"/></svg> Snooze 5 min</button>
      <button class="escape-btn escape-secondary" id="btn-allow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Allow this site permanently</button>
      <button class="escape-btn escape-danger" id="btn-end-early"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg> End the block early</button>
    </div>

    <!-- Passphrase challenge -->
    <div id="passphrase-challenge" class="passphrase-section" style="display:none">
      <p class="passphrase-label">Type your commitment phrase to continue:</p>
      <p class="passphrase-reference" id="passphrase-reference"></p>
      <input type="text" id="passphrase-input" class="passphrase-input" autocomplete="off" spellcheck="false">
      <div class="passphrase-progress">
        <div class="passphrase-bar" id="passphrase-bar"></div>
      </div>
      <button class="btn-cancel" id="btn-cancel-challenge">Never mind, keep me focused</button>
    </div>

    <!-- Cooldown -->
    <div id="cooldown-section" class="cooldown-section" style="display:none">
      <p class="cooldown-warning" id="cooldown-warning"></p>
      <div class="cooldown-timer" id="cooldown-timer"></div>
      <div class="cooldown-actions">
        <button class="escape-btn escape-danger" id="btn-confirm-end">End the block</button>
        <button class="btn-cancel" id="btn-cancel-cooldown">Keep me focused</button>
      </div>
    </div>

    <button class="back-btn" id="go-back">Go back to what matters</button>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
