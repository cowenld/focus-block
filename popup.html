<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Block</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <h1>Focus Block</h1>
      <button class="settings-btn" id="open-settings" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>

    <div id="status-section" class="section">
      <div id="current-status"></div>
    </div>

    <div id="focus-section" class="section">
      <div id="focus-active" style="display:none">
        <div class="focus-status">
          <span class="focus-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Focus active</span>
          <span class="focus-timer" id="focus-timer"></span>
        </div>
        <button class="btn btn-small btn-danger" id="end-focus">End focus</button>
      </div>
      <div id="focus-start">
        <p class="section-label">Focus now</p>
        <div class="focus-options">
          <button class="btn btn-focus" data-minutes="25">25 min</button>
          <button class="btn btn-focus" data-minutes="60">1 hour</button>
          <button class="btn btn-focus" data-minutes="120">2 hours</button>
        </div>
        <label class="checkbox-small">
          <input type="checkbox" id="focus-blackout"> Block everything
        </label>
      </div>
    </div>

    <div id="quick-block" class="section">
      <p class="section-label">Quick block</p>
      <div class="current-site" id="current-site-info"></div>
    </div>
  </div>
  <script src="storage.js"></script>
  <script src="matching.js"></script>
  <script src="schedule-engine.js"></script>
  <script src="icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
